<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transfers - Scout Zone</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark-custom p-3">
    <div class="container">
        <a class="navbar-brand" href="index.html"><i class="fas fa-futbol"></i> Scout Zone</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                <li class="nav-item"><a class="nav-link active" href="transfers.html">Transfers</a></li>
                <li class="nav-item"><a class="nav-link" href="academy-dashboard.html">Academy</a></li>
                <li class="nav-item"><a class="nav-link" href="competitions.html">Competitions</a></li>
                <li class="nav-item"><a class="nav-link" href="statistics.html">Statistics</a></li>
                <li class="nav-item"><a class="nav-link" href="video-analysis.html">Analysis</a></li>
                <li class="nav-item"><a class="nav-link" href="store.html">Store</a></li>
                <li class="nav-item"><a class="nav-link" href="chat.html">Chat</a></li>
                <li class="nav-item"><a class="btn btn-custom ms-2" href="login.html">Login</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <!-- Hero Section -->
    <div class="hero-section text-center">
        <h1 class="display-4 fw-bold">Transfer <span class="text-gradient">Market</span></h1>
        <p class="lead text-secondary">Discover, scout, and sign the next generation of football talent</p>
    </div>

    <!-- Search & Filter -->
    <div class="card-dark mb-4">
        <div class="row g-3">
            <div class="col-md-4">
                <input type="text" class="form-control" placeholder="Search players..." id="searchPlayer">
            </div>
            <div class="col-md-3">
                <select class="form-control" id="positionFilter">
                    <option value="">All Positions</option>
                    <option value="Goalkeeper">Goalkeeper</option>
                    <option value="Defender">Defender</option>
                    <option value="Midfielder">Midfielder</option>
                    <option value="Forward">Forward</option>
                </select>
            </div>
            <div class="col-md-3">
                <select class="form-control" id="priceFilter">
                    <option value="">Any Price</option>
                    <option value="0-100k">$0 - $100K</option>
                    <option value="100k-500k">$100K - $500K</option>
                    <option value="500k-1m">$500K - $1M</option>
                    <option value="1m+">$1M+</option>
                </select>
            </div>
            <div class="col-md-2">
                <button class="btn-primary-custom w-100" onclick="filterPlayers()">Search</button>
            </div>
        </div>
    </div>

    <!-- Players Grid -->
    <div class="row g-4" id="playersGrid">
        <!-- Players will be loaded here -->
    </div>
</div>

<!-- Player Details Modal -->
<div class="modal fade" id="playerModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content bg-dark text-white">
            <div class="modal-header">
                <h5 class="modal-title" id="modalPlayerName"></h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" id="modalPlayerDetails"></div>
        </div>
    </div>
</div>

<footer class="text-center text-secondary py-4 mt-5">
    <div class="container">
        <p>&copy; 2026 Scout Zone. All rights reserved. | <a href="terms.html" class="text-cyan">Terms</a> | <a href="privacy.html" class="text-cyan">Privacy</a> | <a href="contact.html" class="text-cyan">Contact</a></p>
    </div>
</footer>

<script>
    const players = [
        { name: "Marcus Anderson", age: 21, position: "Forward", club: "Manchester United", price: 4500000, speed: 9.2, accuracy: 78, fitness: 85, country: "England", image: "https://randomuser.me/api/portraits/men/1.jpg" },
        { name: "Lucas Silva", age: 19, position: "Midfielder", club: "Real Madrid", price: 3200000, speed: 8.7, accuracy: 82, fitness: 88, country: "Brazil", image: "https://randomuser.me/api/portraits/men/2.jpg" },
        { name: "Kevin Osei", age: 20, position: "Forward", club: "Ajax", price: 2800000, speed: 9.5, accuracy: 74, fitness: 82, country: "Ghana", image: "https://randomuser.me/api/portraits/men/3.jpg" },
        { name: "David Kim", age: 22, position: "Defender", club: "Bayern Munich", price: 3500000, speed: 8.3, accuracy: 71, fitness: 84, country: "South Korea", image: "https://randomuser.me/api/portraits/men/4.jpg" },
        { name: "Mohamed Al-Rashid", age: 18, position: "Midfielder", club: "Al-Hilal", price: 1500000, speed: 8.9, accuracy: 79, fitness: 81, country: "Saudi Arabia", image: "https://randomuser.me/api/portraits/men/5.jpg" },
        { name: "Ethan Williams", age: 23, position: "Goalkeeper", club: "Chelsea", price: 5500000, speed: 7.5, accuracy: 65, fitness: 79, country: "England", image: "https://randomuser.me/api/portraits/men/6.jpg" },
        { name: "Thiago Costa", age: 20, position: "Defender", club: "Barcelona", price: 2900000, speed: 8.1, accuracy: 70, fitness: 83, country: "Portugal", image: "https://randomuser.me/api/portraits/men/7.jpg" },
        { name: "Jean-Pierre Mbappe", age: 19, position: "Forward", club: "PSG", price: 6800000, speed: 9.8, accuracy: 76, fitness: 87, country: "France", image: "https://randomuser.me/api/portraits/men/8.jpg" }
    ];

    function displayPlayers(filteredPlayers) {
        let grid = document.getElementById('playersGrid');
        let html = '';
        for (let p of filteredPlayers) {
            let priceDisplay = p.price >= 1000000 ? `$${(p.price/1000000).toFixed(1)}M` : `$${(p.price/1000).toFixed(0)}K`;
            html += `
                <div class="col-md-3 col-sm-6">
                    <div class="card-dark text-center">
                        <img src="${p.image}" class="rounded-circle mt-3" width="80" height="80">
                        <h5 class="mt-3">${p.name}</h5>
                        <p class="text-secondary small">${p.position} | ${p.age} yrs</p>
                        <p class="text-cyan fw-bold">${priceDisplay}</p>
                        <div class="d-flex justify-content-around mb-3">
                            <span><i class="fas fa-bolt text-warning"></i> ${p.speed}</span>
                            <span><i class="fas fa-chart-line text-info"></i> ${p.accuracy}%</span>
                            <span><i class="fas fa-heartbeat text-danger"></i> ${p.fitness}%</span>
                        </div>
                        <button class="btn-primary-custom w-100" onclick="showPlayerDetails('${p.name}')">View Profile</button>
                    </div>
                </div>
            `;
        }
        grid.innerHTML = html;
    }

    function showPlayerDetails(name) {
        let player = players.find(p => p.name === name);
        document.getElementById('modalPlayerName').innerHTML = `${player.name} <span class="text-secondary small">(${player.position})</span>`;
        let priceDisplay = player.price >= 1000000 ? `$${(player.price/1000000).toFixed(1)}M` : `$${(player.price/1000).toFixed(0)}K`;
        document.getElementById('modalPlayerDetails').innerHTML = `
            <div class="row">
                <div class="col-md-4 text-center">
                    <img src="${player.image}" class="rounded-circle" width="120" height="120">
                    <h6 class="mt-2">${player.club}</h6>
                    <p class="text-secondary">${player.country}</p>
                </div>
                <div class="col-md-8">
                    <h5><i class="fas fa-chart-line text-cyan"></i> Performance Stats</h5>
                    <div class="row mt-3">
                        <div class="col-6"><strong>Top Speed:</strong> ${player.speed} m/s</div>
                        <div class="col-6"><strong>Passing Accuracy:</strong> ${player.accuracy}%</div>
                        <div class="col-6"><strong>Fitness:</strong> ${player.fitness}%</div>
                        <div class="col-6"><strong>Market Value:</strong> ${priceDisplay}</div>
                    </div>
                    <hr>
                    <h6><i class="fas fa-clipboard-list"></i> Scout Report</h6>
                    <p>${player.name} is a ${player.position.toLowerCase()} with excellent ${player.speed > 9 ? 'pace' : 'technical ability'}. ${player.accuracy > 75 ? 'High passing accuracy makes him a playmaker.' : 'Needs improvement in final third.'}</p>
                    <button class="btn-primary-custom w-100 mt-3" onclick="alert('Transfer request sent for ${player.name}')">Make Offer</button>
                </div>
            </div>
        `;
        new bootstrap.Modal(document.getElementById('playerModal')).show();
    }

    function filterPlayers() {
        let search = document.getElementById('searchPlayer').value.toLowerCase();
        let position = document.getElementById('positionFilter').value;
        let priceRange = document.getElementById('priceFilter').value;
        
        let filtered = players.filter(p => {
            let matchSearch = p.name.toLowerCase().includes(search) || p.club.toLowerCase().includes(search);
            let matchPosition = !position || p.position === position;
            let matchPrice = true;
            if (priceRange === '0-100k') matchPrice = p.price < 100000;
            else if (priceRange === '100k-500k') matchPrice = p.price >= 100000 && p.price < 500000;
            else if (priceRange === '500k-1m') matchPrice = p.price >= 500000 && p.price < 1000000;
            else if (priceRange === '1m+') matchPrice = p.price >= 1000000;
            return matchSearch && matchPosition && matchPrice;
        });
        displayPlayers(filtered);
    }

    displayPlayers(players);
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
