<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat - Scout Zone</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .chat-container {
            background: #1e293b;
            border-radius: 24px;
            height: 550px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }
        .message {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
        }
        .message.sent { align-items: flex-end; }
        .message.received { align-items: flex-start; }
        .message-bubble {
            max-width: 75%;
            padding: 10px 16px;
            border-radius: 20px;
            margin: 5px 0;
        }
        .message.sent .message-bubble {
            background: linear-gradient(135deg, #00d4ff, #00b8d4);
            color: #0a0f1e;
        }
        .message.received .message-bubble {
            background: #0f172a;
            color: white;
        }
        .message-time {
            font-size: 10px;
            color: #888;
            margin-top: 4px;
            padding: 0 8px;
        }
        .chat-input-area {
            padding: 15px;
            background: #0f172a;
            border-top: 1px solid #2d3a4e;
        }
        .online-users {
            background: #1e293b;
            border-radius: 24px;
            padding: 20px;
            height: 550px;
            overflow-y: auto;
        }
        .user-item {
            padding: 12px;
            border-radius: 16px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: 0.3s;
        }
        .user-item:hover, .user-item.active {
            background: rgba(0, 212, 255, 0.15);
            border-left: 3px solid #00d4ff;
        }
        .user-status {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
        }
        .status-online { background: #10b981; box-shadow: 0 0 5px #10b981; }
        .status-offline { background: #64748b; }
        .typing-indicator {
            font-size: 12px;
            color: #00d4ff;
            font-style: italic;
            margin-top: 5px;
            padding-left: 12px;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark-custom p-3">
    <div class="container">
        <a class="navbar-brand" href="index.html"><i class="fas fa-futbol"></i> Scout Zone</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="transfers.html">Transfers</a></li>
                <li class="nav-item"><a class="nav-link" href="academy-dashboard.html">Academy</a></li>
                <li class="nav-item"><a class="nav-link" href="competitions.html">Competitions</a></li>
                <li class="nav-item"><a class="nav-link" href="statistics.html">Statistics</a></li>
                <li class="nav-item"><a class="nav-link" href="video-analysis.html">Analysis</a></li>
                <li class="nav-item"><a class="nav-link" href="store.html">Store</a></li>
                <li class="nav-item"><a class="nav-link active" href="chat.html">Chat</a></li>
                <li class="nav-item"><a class="btn btn-custom ms-2" href="login.html">Login</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="row">
        <!-- Users Column -->
        <div class="col-md-4">
            <div class="online-users">
                <h5><i class="fas fa-users text-cyan"></i> Online Now <span id="onlineCount" class="badge bg-success ms-2">0</span></h5>
                <hr>
                <div id="usersList"></div>
                <hr>
                <div class="mt-3">
                    <h6><i class="fas fa-user-plus text-cyan"></i> Add New Contact</h6>
                    <div class="input-group">
                        <input type="text" id="newUserName" class="form-control" placeholder="Enter username">
                        <select id="newUserRole" class="form-control" style="width: auto;">
                            <option value="player">Player</option>
                            <option value="coach">Coach</option>
                            <option value="scout">Scout</option>
                        </select>
                        <button class="btn-primary-custom" onclick="addUser()"><i class="fas fa-plus"></i></button>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Chat Column -->
        <div class="col-md-8">
            <div class="chat-container">
                <div class="messages-area" id="messagesArea">
                    <div class="text-center text-secondary mt-5">
                        <i class="fas fa-comments fa-3x mb-2"></i>
                        <p>Select a user to start chatting</p>
                    </div>
                </div>
                <div class="chat-input-area">
                    <div class="input-group">
                        <input type="text" id="messageInput" class="form-control" placeholder="Type your message..." disabled>
                        <button class="btn-primary-custom" onclick="sendMessage()" id="sendBtn" disabled>
                            <i class="fas fa-paper-plane"></i> Send
                        </button>
                    </div>
                    <div id="typingIndicator" class="typing-indicator"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<footer class="text-center text-secondary py-4 mt-5">
    <div class="container">
        <p>&copy; 2026 Scout Zone. All rights reserved. | <a href="terms.html" class="text-cyan">Terms</a> | <a href="privacy.html" class="text-cyan">Privacy</a> | <a href="contact.html" class="text-cyan">Contact</a></p>
    </div>
</footer>

<script>
    let currentUser = localStorage.getItem('loggedInUser');
    if (!currentUser) {
        currentUser = JSON.parse(localStorage.getItem('loggedInUser'));
        if (!currentUser) window.location.href = 'login.html';
        else currentUser = currentUser.email || currentUser.name || 'Guest';
    } else if (typeof currentUser === 'object') {
        currentUser = currentUser.email || currentUser.name || 'Guest';
    }
    
    let activeChatWith = null;
    let typingTimeout = null;
    
    // Initialize users
    function initUsers() {
        let users = JSON.parse(localStorage.getItem('chat_users_scoutzone')) || [];
        if (!users.find(u => u.name === currentUser)) {
            users.push({ name: currentUser, role: 'player', status: 'online', lastSeen: new Date() });
            localStorage.setItem('chat_users_scoutzone', JSON.stringify(users));
        }
        return users;
    }
    
    function loadUsers() {
        let users = JSON.parse(localStorage.getItem('chat_users_scoutzone')) || [];
        let onlineUsers = users.filter(u => u.status === 'online' && u.name !== currentUser);
        let offlineUsers = users.filter(u => u.status !== 'online' && u.name !== currentUser);
        
        document.getElementById('onlineCount').innerHTML = onlineUsers.length;
        
        let html = '';
        if (onlineUsers.length > 0) {
            html += '<h6 class="text-success mb-2"><i class="fas fa-circle"></i> Online</h6>';
            for (let u of onlineUsers) {
                let roleIcon = u.role === 'coach' ? 'fa-chalkboard-user' : (u.role === 'scout' ? 'fa-eye' : 'fa-user');
                html += `<div class="user-item ${activeChatWith === u.name ? 'active' : ''}" onclick="startChat('${u.name}')">
                    <i class="fas ${roleIcon} text-cyan me-2"></i>
                    <strong>${u.name}</strong>
                    <span class="badge bg-success ms-2" style="font-size:9px;">${u.role}</span>
                    <div class="small text-secondary"><span class="user-status status-online"></span> Online now</div>
                </div>`;
            }
        }
        
        if (offlineUsers.length > 0) {
            html += '<h6 class="text-secondary mt-3 mb-2"><i class="fas fa-clock"></i> Offline</h6>';
            for (let u of offlineUsers) {
                html += `<div class="user-item" onclick="startChat('${u.name}')">
                    <i class="fas fa-user me-2"></i>
                    <strong>${u.name}</strong>
                    <div class="small text-secondary"><span class="user-status status-offline"></span> Last seen ${u.lastSeen ? new Date(u.lastSeen).toLocaleTimeString() : 'recently'}</div>
                </div>`;
            }
        }
        
        document.getElementById('usersList').innerHTML = html || '<p class="text-secondary">No other users yet. Add contacts above!</p>';
    }
    
    function addUser() {
        let name = document.getElementById('newUserName').value.trim();
        let role = document.getElementById('newUserRole').value;
        if (!name) { alert('Enter a username'); return; }
        
        let users = JSON.parse(localStorage.getItem('chat_users_scoutzone')) || [];
        if (users.find(u => u.name === name)) { alert('User already exists'); return; }
        
        users.push({ name: name, role: role, status: 'offline', lastSeen: new Date() });
        localStorage.setItem('chat_users_scoutzone', JSON.stringify(users));
        document.getElementById('newUserName').value = '';
        loadUsers();
        alert(`Added ${name} as ${role}!`);
    }
    
    function startChat(userName) {
        activeChatWith = userName;
        loadMessages();
        document.getElementById('messageInput').disabled = false;
        document.getElementById('sendBtn').disabled = false;
        loadUsers();
    }
    
    function loadMessages() {
        if (!activeChatWith) return;
        let conversations = JSON.parse(localStorage.getItem('chat_messages_scoutzone')) || {};
        let key = [currentUser, activeChatWith].sort().join('_');
        let messages = conversations[key] || [];
        
        let area = document.getElementById('messagesArea');
        if (messages.length === 0) {
            area.innerHTML = `<div class="text-center text-secondary mt-5">
                <i class="fas fa-comment-dots fa-3x mb-2"></i>
                <p>Start your conversation with ${activeChatWith}</p>
            </div>`;
            return;
        }
        
        let html = '';
        for (let msg of messages) {
            let isSent = msg.sender === currentUser;
            html += `
                <div class="message ${isSent ? 'sent' : 'received'}">
                    <div class="message-bubble">
                        <small class="fw-bold">${msg.sender}</small><br>
                        ${msg.text}
                    </div>
                    <div class="message-time">${msg.time}</div>
                </div>
            `;
        }
        area.innerHTML = html;
        area.scrollTop = area.scrollHeight;
    }
    
    function sendMessage() {
        let text = document.getElementById('messageInput').value.trim();
        if (!text || !activeChatWith) return;
        
        let conversations = JSON.parse(localStorage.getItem('chat_messages_scoutzone')) || {};
        let key = [currentUser, activeChatWith].sort().join('_');
        let messages = conversations[key] || [];
        
        messages.push({
            sender: currentUser,
            receiver: activeChatWith,
            text: text,
            time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})
        });
        
        conversations[key] = messages;
        localStorage.setItem('chat_messages_scoutzone', JSON.stringify(conversations));
        document.getElementById('messageInput').value = '';
        loadMessages();
        
        // Simulate typing indicator
        document.getElementById('typingIndicator').innerHTML = '';
    }
    
    function updateCurrentUserStatus() {
        let users = JSON.parse(localStorage.getItem('chat_users_scoutzone')) || [];
        let user = users.find(u => u.name === currentUser);
        if (user) {
            user.status = 'online';
            user.lastSeen = new Date();
            localStorage.setItem('chat_users_scoutzone', JSON.stringify(users));
        }
        loadUsers();
    }
    
    document.getElementById('messageInput').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') sendMessage();
    });
    
    setInterval(updateCurrentUserStatus, 30000);
    updateCurrentUserStatus();
    initUsers();
    loadUsers();
</script>
</body>
</html>
