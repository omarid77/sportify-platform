<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم الأكاديميات - Sportify Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark-custom p-3">
    <div class="container">
        <a class="navbar-brand text-cyan" href="index.html"><i class="fas fa-futbol"></i> Sportify Pro</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link text-white" href="index.html">الرئيسية</a></li>
                <li class="nav-item"><a class="nav-link text-white active" href="academy-dashboard.html">الأكاديميات</a></li>
                <li class="nav-item"><span id="academyName" class="text-white me-2"></span></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <!-- نموذج تسجيل دخول الأكاديمية -->
    <div id="academyLogin" class="card-dark" style="display:none;">
        <h4><i class="fas fa-school"></i> دخول الأكاديمية</h4>
        <input type="text" id="academyEmail" class="form-control bg-dark text-white mb-2" placeholder="البريد الإلكتروني للأكاديمية">
        <input type="password" id="academyPassword" class="form-control bg-dark text-white mb-2" placeholder="كلمة السر">
        <button onclick="academyLogin()" class="btn-primary-custom">دخول</button>
        <button onclick="registerAcademy()" class="btn btn-outline-info mt-2">تسجيل أكاديمية جديدة</button>
    </div>
    
    <!-- لوحة التحكم بعد الدخول -->
    <div id="academyDashboard" style="display:none;">
        <div class="row">
            <div class="col-md-3">
                <div class="card-dark text-center">
                    <i class="fas fa-users fa-3x text-cyan"></i>
                    <h3 id="totalPlayers">0</h3>
                    <p>إجمالي اللاعبين</p>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card-dark text-center">
                    <i class="fas fa-chart-line fa-3x text-cyan"></i>
                    <h3 id="avgAccuracy">0%</h3>
                    <p>متوسط دقة التمرير</p>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card-dark text-center">
                    <i class="fas fa-tachometer-alt fa-3x text-cyan"></i>
                    <h3 id="avgSpeed">0</h3>
                    <p>متوسط السرعة (م/ث)</p>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card-dark text-center">
                    <i class="fas fa-heartbeat fa-3x text-cyan"></i>
                    <h3 id="avgFitness">0%</h3>
                    <p>متوسط اللياقة</p>
                </div>
            </div>
        </div>
        
        <div class="row mt-3">
            <div class="col-md-8">
                <div class="card-dark">
                    <h5><i class="fas fa-chart-simple"></i> تطور اللاعبين (متوسط دقة التمرير)</h5>
                    <canvas id="playersChart" height="200"></canvas>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card-dark">
                    <h5><i class="fas fa-medal"></i> أفضل اللاعبين</h5>
                    <div id="topPlayers"></div>
                </div>
            </div>
        </div>
        
        <div class="card-dark">
            <h5><i class="fas fa-list"></i> قائمة اللاعبين المسجلين</h5>
            <input type="text" id="searchPlayer" class="form-control bg-dark text-white mb-2" placeholder="بحث باسم اللاعب...">
            <div id="playersList" class="table-responsive">
                <table class="table text-white">
                    <thead>
                        <tr><th>اللاعب</th><th>آخر دقة تمرير</th><th>آخر سرعة</th><th>آخر لياقة</th><th>أداء</th></tr>
                    </thead>
                    <tbody id="playersTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script src="script.js"></script>
<script>
    // بيانات الأكاديميات (localStorage)
    let currentAcademy = localStorage.getItem("loggedAcademy");
    
    if (!currentAcademy) {
        document.getElementById('academyLogin').style.display = 'block';
    } else {
        document.getElementById('academyDashboard').style.display = 'block';
        document.getElementById('academyName').innerHTML = `🏫 ${currentAcademy}`;
        loadAcademyData();
    }
    
    // تسجيل أكاديمية جديدة
    function registerAcademy() {
        let email = document.getElementById('academyEmail').value;
        let password = document.getElementById('academyPassword').value;
        if (email && password) {
            let academies = JSON.parse(localStorage.getItem("academies")) || {};
            if (!academies[email]) {
                academies[email] = { password: password, players: [] };
                localStorage.setItem("academies", JSON.stringify(academies));
                alert("تم تسجيل الأكاديمية بنجاح! يمكنك الآن الدخول.");
            } else {
                alert("هذه الأكاديمية مسجلة بالفعل");
            }
        } else {
            alert("يرجى إدخال البريد وكلمة السر");
        }
    }
    
    function academyLogin() {
        let email = document.getElementById('academyEmail').value;
        let password = document.getElementById('academyPassword').value;
        let academies = JSON.parse(localStorage.getItem("academies")) || {};
        
        if (academies[email] && academies[email].password === password) {
            localStorage.setItem("loggedAcademy", email);
            location.reload();
        } else {
            alert("بيانات دخول غير صحيحة");
        }
    }
    
    // إضافة لاعب للأكاديمية
    function addPlayerToAcademy(playerEmail, playerData) {
        let academies = JSON.parse(localStorage.getItem("academies")) || {};
        let academyData = academies[currentAcademy];
        if (academyData) {
            let existing = academyData.players.find(p => p.email === playerEmail);
            if (!existing) {
                academyData.players.push({ email: playerEmail, data: playerData });
                localStorage.setItem("academies", JSON.stringify(academies));
            }
        }
    }
    
    // تحميل وعرض بيانات الأكاديمية
    function loadAcademyData() {
        let academies = JSON.parse(localStorage.getItem("academies")) || {};
        let academyData = academies[currentAcademy];
        
        if (!academyData || academyData.players.length === 0) {
            document.getElementById('playersTableBody').innerHTML = '<tr><td colspan="5" class="text-center">لا يوجد لاعبون مسجلون بعد</td></tr>';
            document.getElementById('totalPlayers').innerText = "0";
            return;
        }
        
        let players = academyData.players;
        document.getElementById('totalPlayers').innerText = players.length;
        
        // حساب المتوسطات
        let totalAccuracy = 0, totalSpeed = 0, totalFitness = 0, count = 0;
        let playerStats = [];
        
        for (let p of players) {
            let lastData = p.data[p.data.length-1] || { accuracy: 0, speed: 0, fitness: 0 };
            totalAccuracy += lastData.accuracy || 0;
            totalSpeed += lastData.speed || 0;
            totalFitness += lastData.fitness || 0;
            count++;
            playerStats.push({ email: p.email, ...lastData });
        }
        
        document.getElementById('avgAccuracy').innerText = Math.round(totalAccuracy/count) + "%";
        document.getElementById('avgSpeed').innerText = (totalSpeed/count).toFixed(1);
        document.getElementById('avgFitness').innerText = Math.round(totalFitness/count) + "%";
        
        // عرض الجدول
        let html = '';
        for (let p of playerStats) {
            let performance = (p.accuracy > 70 && p.speed > 8) ? "متميز" : (p.accuracy > 50 ? "جيد" : "يحتاج تحسين");
            html += `<tr>
                        <td>${p.email}</td>
                        <td>${p.accuracy || 0}%</td>
                        <td>${p.speed || 0} م/ث</td>
                        <td>${p.fitness || 0}%</td>
                        <td><span class="badge ${performance === 'متميز' ? 'bg-success' : (performance === 'جيد' ? 'bg-warning' : 'bg-danger')}">${performance}</span></td>
                     </tr>`;
        }
        document.getElementById('playersTableBody').innerHTML = html;
        
        // أفضل 3 لاعبين
        let sorted = [...playerStats].sort((a,b) => (b.accuracy||0) - (a.accuracy||0)).slice(0,3);
        let topHtml = '';
        sorted.forEach((p, idx) => {
            topHtml += `<div class="mb-2">${idx+1}. ${p.email} - دقة ${p.accuracy}%</div>`;
        });
        document.getElementById('topPlayers').innerHTML = topHtml || "لا توجد بيانات";
        
        // رسم بياني (محاكاة)
        let ctx = document.getElementById('playersChart').getContext('2d');
        if (window.academyChart) window.academyChart.destroy();
        window.academyChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: playerStats.slice(0,5).map(p => p.email.split('@')[0]),
                datasets: [{ label: 'دقة التمرير %', data: playerStats.slice(0,5).map(p => p.accuracy || 0), backgroundColor: '#00d4ff' }]
            },
            options: { responsive: true, plugins: { legend: { labels: { color: 'white' } } } }
        });
    }
    
    // وظيفة لتسجيل لاعب جديد (من صفحة إدخال البيانات)
    window.registerPlayerWithAcademy = function(playerEmail, performanceData) {
        let academies = JSON.parse(localStorage.getItem("academies")) || {};
        for (let academyEmail in academies) {
            // إذا شاءت الأكاديمية إضافة لاعب - هذه ميزة متقدمة، للإطار الحالي نتركها يدوية
        }
    };
</script>
</body>
</html>
