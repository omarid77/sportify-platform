<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Scout Zone</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark-custom p-3">
    <div class="container">
        <a class="navbar-brand" href="index.html"><i class="fas fa-futbol"></i> Scout Zone</a>
    </div>
</nav>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card-dark fade-in-up">
                <div class="text-center mb-4">
                    <i class="fas fa-user-circle fa-4x text-cyan"></i>
                    <h3 class="mt-2">Welcome Back</h3>
                    <p class="text-secondary">Sign in to access your dashboard</p>
                </div>
                
                <form id="loginForm">
                    <div class="mb-3">
                        <label class="form-label">Email address</label>
                        <input type="email" class="form-control" id="loginEmail" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" class="form-control" id="loginPassword" required>
                    </div>
                    <button type="submit" class="btn-primary-custom w-100">
                        <i class="fas fa-sign-in-alt"></i> Sign In
                    </button>
                </form>
                
                <hr class="my-4">
                
                <div class="text-center">
                    <p class="text-secondary">Don't have an account?</p>
                    <button class="btn-outline-custom w-100" data-bs-toggle="modal" data-bs-target="#registerModal">
                        <i class="fas fa-user-plus"></i> Create Account
                    </button>
                </div>
                
                <div id="loginError" class="alert alert-danger mt-3" style="display:none;"></div>
            </div>
        </div>
    </div>
</div>

<!-- Register Modal -->
<div class="modal fade" id="registerModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content bg-dark text-white">
            <div class="modal-header">
                <h5 class="modal-title"><i class="fas fa-user-plus text-cyan"></i> Create Account</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="registerForm">
                    <div class="mb-3">
                        <label class="form-label">Full Name</label>
                        <input type="text" class="form-control" id="regName" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control" id="regEmail" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" class="form-control" id="regPassword" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Role</label>
                        <select class="form-control" id="regRole">
                            <option value="player">Player</option>
                            <option value="coach">Coach</option>
                            <option value="academy">Academy</option>
                        </select>
                    </div>
                    <button type="submit" class="btn-primary-custom w-100">Register</button>
                </form>
                <div id="registerSuccess" class="alert alert-success mt-3" style="display:none;"></div>
            </div>
        </div>
    </div>
</div>

<script>
    // Simple localStorage authentication (can be replaced with Firebase Auth)
    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        let email = document.getElementById('loginEmail').value;
        let password = document.getElementById('loginPassword').value;
        
        let users = JSON.parse(localStorage.getItem('scoutzone_users')) || [];
        let user = users.find(u => u.email === email && u.password === password);
        
        if (user) {
            localStorage.setItem('loggedInUser', JSON.stringify(user));
            window.location.href = 'index.html';
        } else {
            document.getElementById('loginError').innerHTML = 'Invalid email or password';
            document.getElementById('loginError').style.display = 'block';
        }
    });
    
    document.getElementById('registerForm').addEventListener('submit', function(e) {
        e.preventDefault();
        let users = JSON.parse(localStorage.getItem('scoutzone_users')) || [];
        let newUser = {
            name: document.getElementById('regName').value,
            email: document.getElementById('regEmail').value,
            password: document.getElementById('regPassword').value,
            role: document.getElementById('regRole').value
        };
        
        if (users.find(u => u.email === newUser.email)) {
            alert('Email already exists!');
            return;
        }
        
        users.push(newUser);
        localStorage.setItem('scoutzone_users', JSON.stringify(users));
        document.getElementById('registerSuccess').innerHTML = 'Account created! You can now login.';
        document.getElementById('registerSuccess').style.display = 'block';
        
        setTimeout(() => {
            bootstrap.Modal.getInstance(document.getElementById('registerModal')).hide();
            document.getElementById('registerForm').reset();
        }, 1500);
    });
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
