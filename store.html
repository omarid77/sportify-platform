<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر الخطط التدريبية - Sportify Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark-custom p-3">
    <div class="container">
        <a class="navbar-brand text-cyan" href="index.html"><i class="fas fa-futbol"></i> Sportify Pro</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link text-white" href="index.html">الرئيسية</a></li>
                <li class="nav-item"><a class="nav-link text-white" href="input-data.html">بيانات</a></li>
                <li class="nav-item"><a class="nav-link text-white" href="video-analysis.html">تحليل فيديو</a></li>
                <li class="nav-item"><a class="nav-link text-white" href="academy-dashboard.html">الأكاديميات</a></li>
                <li class="nav-item"><a class="nav-link text-white" href="chat.html">دردشة</a></li>
                <li class="nav-item"><a class="nav-link text-white active" href="store.html">متجر</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="text-center mb-4">
        <h1 class="text-white"><i class="fas fa-store text-cyan"></i> متجر الخطط التدريبية</h1>
        <p class="text-secondary">خطط احترافية مصممة بواسطة مدربين معتمدين</p>
    </div>
    
    <div class="row g-4" id="productsContainer">
        <!-- المنتجات ستظهر هنا عبر JavaScript -->
    </div>
    
    <!-- سلة المشتريات -->
    <div class="card-dark mt-4">
        <h5><i class="fas fa-shopping-cart text-cyan"></i> سلة المشتريات</h5>
        <div id="cartItems"></div>
        <div id="cartTotal" class="mt-2"></div>
        <button onclick="checkout()" class="btn-primary-custom mt-2" id="checkoutBtn">إتمام الشراء</button>
    </div>
</div>

<!-- Modal الدفع -->
<div class="modal fade" id="paymentModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content bg-dark text-white">
            <div class="modal-header">
                <h5 class="modal-title"><i class="fab fa-paypal"></i> إتمام الدفع</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <p>هذه نسخة تجريبية من المتجر.</p>
                <div class="alert alert-info">
                    <i class="fas fa-credit-card"></i> للاختبار، استخدم:
                    <strong>demo@example.com</strong> / أي كلمة سر
                </div>
                <input type="text" class="form-control mb-2" placeholder="البريد الإلكتروني" id="paymentEmail">
                <input type="password" class="form-control mb-2" placeholder="كلمة السر" id="paymentPassword">
                <div id="paymentMessage" class="text-info small"></div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">إلغاء</button>
                <button class="btn-primary-custom" onclick="processPayment()">تأكيد الدفع</button>
            </div>
        </div>
    </div>
</div>

<script src="script.js"></script>
<script>
    let currentUser = localStorage.getItem("loggedInUser") || "زائر";
    let cart = JSON.parse(localStorage.getItem(`cart_${currentUser}`)) || [];
    
    const products = [
        { id: 1, name: "خطة سرعة ورشاقة", description: "6 أسابيع لتحسين السرعة القصوى والتسارع", price: 49, icon: "fa-bolt", level: "متوسط" },
        { id: 2, name: "خطة لياقة بدنية HIIT", description: "تمارين عالية الكثافة لتحسين اللياقة", price: 39, icon: "fa-heartbeat", level: "جميع المستويات" },
        { id: 3, name: "خطة تحكم بالكرة", description: "مراوغة، استلام، تمرير - 8 أسابيع", price: 59, icon: "fa-futbol", level: "مبتدئ + متوسط" },
        { id: 4, name: "خطة تسجيل الأهداف", description: "تقنيات التصويب من داخل وخارج المنطقة", price: 44, icon: "fa-bullseye", level: "متقدم" },
        { id: 5, name: "باقة المحترف الكاملة", description: "جميع الخطط السابقة + جلسات خاصة", price: 149, icon: "fa-crown", level: "احترافي" },
        { id: 6, name: "خطة تكتيك وقراءة المباراة", description: "فهم مراكزك واتخاذ القرار السريع", price: 54, icon: "fa-chess-board", level: "متوسط + متقدم" }
    ];
    
    function displayProducts() {
        let container = document.getElementById('productsContainer');
        let html = '';
        for (let p of products) {
            let inCart = cart.find(item => item.id === p.id);
            html += `
                <div class="col-md-4 col-lg-4">
                    <div class="card-dark h-100">
                        <i class="fas ${p.icon} fa-3x text-cyan mb-3"></i>
                        <h5>${p.name}</h5>
                        <p class="text-secondary small">${p.description}</p>
                        <p><span class="badge bg-info">${p.level}</span></p>
                        <h4 class="text-cyan">$${p.price}</h4>
                        <button onclick="addToCart(${p.id})" class="btn-primary-custom w-100" ${inCart ? 'disabled' : ''}>
                            ${inCart ? '✓ مضاف للسلة' : '<i class="fas fa-cart-plus"></i> أضف للسلة'}
                        </button>
                    </div>
                </div>
            `;
        }
        container.innerHTML = html;
    }
    
    function addToCart(productId) {
        let product = products.find(p => p.id === productId);
        if (product && !cart.find(item => item.id === productId)) {
            cart.push(product);
            localStorage.setItem(`cart_${currentUser}`, JSON.stringify(cart));
            updateCart();
            displayProducts();
        }
    }
    
    function updateCart() {
        let cartContainer = document.getElementById('cartItems');
        let total = 0;
        
        if (cart.length === 0) {
            cartContainer.innerHTML = '<p class="text-secondary">السلة فارغة</p>';
            document.getElementById('cartTotal').innerHTML = '';
            return;
        }
        
        let html = '<div class="table-responsive"><table class="table text-white"><thead><tr><th>المنتج</th><th>السعر</th><th></th></tr></thead><tbody>';
        for (let item of cart) {
            total += item.price;
            html += `<tr>
                        <td>${item.name}</td>
                        <td>$${item.price}</td>
                        <td><button class="btn btn-sm btn-danger" onclick="removeFromCart(${item.id})"><i class="fas fa-trash"></i></button></td>
                     </tr>`;
        }
        html += '</tbody></table></div>';
        cartContainer.innerHTML = html;
        document.getElementById('cartTotal').innerHTML = `<h5>الإجمالي: $${total}</h5>`;
    }
    
    function removeFromCart(productId) {
        cart = cart.filter(item => item.id !== productId);
        localStorage.setItem(`cart_${currentUser}`, JSON.stringify(cart));
        updateCart();
        displayProducts();
    }
    
    function checkout() {
        if (cart.length === 0) {
            alert("السلة فارغة!");
            return;
        }
        let modal = new bootstrap.Modal(document.getElementById('paymentModal'));
        modal.show();
    }
    
    function processPayment() {
        let email = document.getElementById('paymentEmail').value;
        let password = document.getElementById('paymentPassword').value;
        
        if (!email || !password) {
            document.getElementById('paymentMessage').innerHTML = 'الرجاء إدخال بيانات الدفع';
            return;
        }
        
        // محاكاة الدفع الناجح
        document.getElementById('paymentMessage').innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري معالجة الدفع...';
        
        setTimeout(() => {
            // حفظ سجل الشراء
            let purchases = JSON.parse(localStorage.getItem(`purchases_${currentUser}`)) || [];
            purchases.push({
                date: new Date().toLocaleString(),
                items: [...cart],
                total: cart.reduce((sum, i) => sum + i.price, 0)
            });
            localStorage.setItem(`purchases_${currentUser}`, JSON.stringify(purchases));
            
            // تفريغ السلة
            cart = [];
            localStorage.setItem(`cart_${currentUser}`, JSON.stringify(cart));
            
            document.getElementById('paymentMessage').innerHTML = '✅ تم الدفع بنجاح! شكراً لشرائك.';
            
            setTimeout(() => {
                let modal = bootstrap.Modal.getInstance(document.getElementById('paymentModal'));
                modal.hide();
                updateCart();
                displayProducts();
                alert("تم شراء الخطط بنجاح! يمكنك الآن مشاهدتها في حسابك.");
                document.getElementById('paymentEmail').value = '';
                document.getElementById('paymentPassword').value = '';
                document.getElementById('paymentMessage').innerHTML = '';
            }, 1500);
        }, 1000);
    }
    
    displayProducts();
    updateCart();
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
